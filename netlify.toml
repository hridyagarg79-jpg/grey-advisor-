# ── Netlify configuration for Grey Advisor (Next.js App Router) ──────
# Using Netlify's built-in Next.js runtime (no plugin needed for Next 15+)
# Docs: https://docs.netlify.com/frameworks/next-js/overview/

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
