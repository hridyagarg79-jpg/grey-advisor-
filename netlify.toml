# ── Netlify configuration for Grey Advisor (Next.js App Router) ──────
# Docs: https://docs.netlify.com/frameworks/next-js/overview/

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  # Prevent Netlify from auto-injecting the Next.js plugin
  # which causes ENOENT on middleware.js.nft.json when no middleware exists
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
