# ── Netlify configuration for Grey Advisor (Next.js App Router) ──────
# Docs: https://docs.netlify.com/frameworks/next-js/overview/

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# @netlify/plugin-nextjs is required for SSR, API routes, and App Router.
# The postbuild script (scripts/postbuild.js) creates placeholder middleware
# artifacts so the plugin does not crash with ENOENT.
[[plugins]]
  package = "@netlify/plugin-nextjs"
